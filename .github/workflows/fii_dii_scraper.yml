name: FII DII Daily Scraper

on:
  schedule:
    - cron: "30 12 * * 1-5"   # 18:00 IST Mon–Fri
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests curl_cffi beautifulsoup4

      - name: Run scrapers
        run: |
          python fii_dii_scrape.py
          python fortnightly_scrape.py

      - name: Commit & push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: FII/DII & FPI flows updated $(date -u +'%Y-%m-%d %H:%M UTC')" && \
            git push
