
name: NSE Heatmap Live Update

on:
  schedule:
    # Runs every 1 minute during market hours (09:15 to 15:35 IST / 03:45 to 10:05 UTC)
    # Mon-Fri
    - cron: '*/1 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  update-heatmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas
          
      - name: Run Scraper
        run: python heatmap_generator.py
        
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/heatmap_data.json
          git commit -m "Auto-update Heatmap Data: $(date)" || exit 0
          git push origin main
