name: Auto-Sync with Upstream

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  sync_with_upstream:
    runs-on: ubuntu-latest
    name: Sync main branch with upstream

    steps:
    - name: Checkout target repo
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Sync upstream changes
      run: |
        # Setup git config
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Add the upstream repository
        git remote add upstream https://github.com/D4Vinci/Scrapling.git
        git fetch upstream
        
        # Merge changes from the upstream main branch
        git checkout main
        git merge upstream/main --no-edit --allow-unrelated-histories
        
        # Push the updates to your repository
        git push origin main
